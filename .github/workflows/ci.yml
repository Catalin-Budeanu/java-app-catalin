name: ci

on:
  push:
    branches: [main, lesson-1]
  pull_request:
    branches: [main]
  workflows_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
  steps:
    -name: Checkout repo
    uses: actions/checkout@v4

    -name: Setup Java 17
    uses: actions/setup-java@v4 (Java 17)
    with:
      distribution: temurin
      java-version: "17"
      cache: maven

    -name: Run tests
    run: mvn -B -ntp clean test
